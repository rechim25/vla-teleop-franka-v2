teleop:
  xr_input_source: xrobotics_sdk
  observation_ip: 127.0.0.1
  observation_port: 28081
  allow_motion: true
  dry_run: false
  control_mode: pose
  scale_factor: 0.8
  control_trigger_threshold: 0.9
  control_trigger_release_threshold: 0.8
  planner_rate_hz: 100.0
  target_pose_filter_alpha: 0.2
  target_position_deadband_m: 0.001
  target_orientation_deadband_rad: 0.01
  start_joint_positions_rad: [0.0, -0.78539816, 0.0, -2.35619449, 0.0, 1.57079633, 0.78539816]
  ik:
    damping: 0.05
    nullspace_gain: 0.15
    nullspace_activation_position_error_m: 0.01
    nullspace_activation_orientation_error_rad: 0.10
    max_joint_velocity_radps: 0.35
    max_joint_step_rad: 0.008
    position_gain: 3.0
    orientation_gain: 2.0
    position_error_deadband_m: 0.0005
    orientation_error_deadband_rad: 0.005
    manipulability_threshold: 0.05
    singularity_damping_gain: 1.0
  gripper:
    enabled: true
    max_width_m: 0.08
    min_width_m: 0.0
    speed_mps: 0.05
    min_command_delta_m: 0.002
    max_command_rate_hz: 20.0
